workflows:
  react-native-expo-android-release:
    name: Expo Android Release (APK)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild
        script: |
          # This creates/syncs the native android folder from your app.json
          npx expo prebuild --platform android --no-install
      - name: Generate React Native Bundle
        script: |
          # Manually ensure the bundle is embedded in the native assets
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --dev false \
            --dest android/app/src/main/res \
            --asset-catalog-dest android/app/src/main/assets
      - name: Build Android APK (Release)
        script: |
          cd android
          # assembleRelease creates the .apk file
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk